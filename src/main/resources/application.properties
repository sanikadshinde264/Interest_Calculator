# ===== Server =====
server.port=${PORT:8080}

# ===== MySQL (default) =====
# Local dev: create the database first with: CREATE DATABASE interest_calc;
# Deployed: set the DB_URL / DB_USERNAME / DB_PASSWORD environment variables
# on your host instead of editing this file.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/interest_calc?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

